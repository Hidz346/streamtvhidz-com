<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiDZ TV</title>
    <link rel="icon" type="image/jpeg" href="https://www.gobox.my.id/file/hNSOM.jpg">
    <link rel="apple-touch-icon" href="https://www.gobox.my.id/file/hNSOM.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #010101;
            color: white;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        @keyframes gradient-x {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-gradient-x {
            background-size: 200% 200%;
            animation: gradient-x 5s ease infinite;
        }

        .animate-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .sticky-player {
            position: sticky;
            top: 3.5rem;
            z-index: 90;
        }

        .rgb-text {
            background: linear-gradient(to right, #22c55e, #3b82f6, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #_shield { position:fixed; inset:0; z-index:99999; background:#010101; display:flex; align-items:center; justify-content:center; }
        #_shield p { color:#ef4444; font-family:'Inter',sans-serif; font-weight:900; font-size:1.2rem; text-transform:uppercase; letter-spacing:0.3em; }
    </style>
</head>

    <!-- Zero-Exposure Shield -->
    <div id="_shield"><p>Akses Ditolak</p></div>

    <!-- Header Statis / Watermark -->
    <header class="fixed top-0 inset-x-0 h-14 flex items-center justify-between px-6 z-[100] bg-black/90 backdrop-blur-xl border-b border-white/[0.05]">
        <div onclick="showPage('home')" class="cursor-pointer select-none transition-all hover:brightness-125 italic flex items-center">
            <span class="text-lg font-[1000] tracking-tighter rgb-text animate-gradient-x">HiDZ</span>
            <span class="text-white font-[1000] text-lg ml-1">TV</span>
        </div>
        <div onclick="showPage('dev')" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center border border-white/10 cursor-pointer active:scale-90 transition-all hover:bg-blue-600">
            <i data-lucide="user" class="w-4 h-4"></i>
        </div>
    </header>

    <!-- Dynamic Content Area -->
    <div id="main-content" class="pb-32"></div>

    <!-- Navigasi Bawah -->
    <nav class="fixed bottom-0 inset-x-0 h-16 bg-black/95 backdrop-blur-2xl border-t border-white/5 flex items-center justify-around z-[100] px-10 shadow-[0_-10px_30px_rgba(0,0,0,0.8)]">
        <button onclick="showPage('home')" id="nav-home" class="flex flex-col items-center gap-1 transition-all duration-300 active:scale-75 text-blue-500">
            <i data-lucide="home" class="w-5 h-5"></i>
            <span class="text-[8px] font-[1000] uppercase tracking-[0.2em] italic">BERANDA</span>
        </button>
        
        <div class="opacity-[0.01] scale-50 pointer-events-none">
           <i data-lucide="monitor" class="w-5 h-5"></i>
        </div>

        <button onclick="showPage('dev')" id="nav-dev" class="flex flex-col items-center gap-1 transition-all duration-300 active:scale-75 text-gray-500 hover:text-white">
            <i data-lucide="user" class="w-5 h-5"></i>
            <span class="text-[8px] font-[1000] uppercase tracking-[0.2em] italic">PENGEMBANG</span>
        </button>
    </nav>

        function createBannerHTML(ch, size) {
            var isLarge = size === 'large';
            return '<div class="w-full h-full bg-gradient-to-br ' + ch.color + ' flex items-center justify-center relative overflow-hidden group-hover:scale-105 transition-all duration-1000">' +
                '<div class="absolute inset-0 flex flex-wrap gap-2 items-center justify-center opacity-[0.03] pointer-events-none rotate-[-15deg] scale-150">' +
                Array(10).fill('<span class="text-xl font-black uppercase tracking-tighter">' + ch.name + '</span>').join('') +
                '</div>' +
                '<div class="relative z-10 p-4 text-center">' +
                '<span class="' + (isLarge ? 'text-4xl md:text-7xl' : 'text-xl md:text-2xl') + ' font-[1000] text-white tracking-[-0.05em] uppercase italic leading-none drop-shadow-lg">' +
                ch.displayName +
                '</span></div>' +
                '<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-black/10"></div></div>';
        }

        window.showPage = function(pageName, channelId) {
            if (!_ok && pageName !== 'dev') return;
            var container = document.getElementById('main-content');
            var navHome = document.getElementById('nav-home');
            var navDev = document.getElementById('nav-dev');

            navHome.classList.remove('text-blue-500');
            navHome.classList.add('text-gray-500');
            navDev.classList.remove('text-blue-500');
            navDev.classList.add('text-gray-500');

            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }

            if (pageName === 'home') {
                navHome.classList.add('text-blue-500');
                var firstCh = CHANNELS[0];
                container.innerHTML =
                    '<div class="pt-14 animate-in">' +
                    '<section class="relative h-[65vh] flex flex-col justify-end p-6 md:p-12 overflow-hidden">' +
                    '<div class="absolute inset-0 z-0">' + createBannerHTML(firstCh, 'large') + '</div>' +
                    '<div class="absolute inset-0 bg-gradient-to-t from-[#010101] via-transparent to-transparent"></div>' +
                    '<div class="absolute inset-0 bg-gradient-to-r from-[#010101]/80 to-transparent"></div>' +
                    '<div class="relative z-10 max-w-2xl space-y-4">' +
                    '<h2 class="text-4xl md:text-7xl font-[1000] leading-none tracking-tighter uppercase italic">' + firstCh.displayName + '</h2>' +
                    '<div class="flex items-center gap-4 text-xs font-bold text-gray-400">' +
                    '<span class="text-green-500 font-black">' + firstCh.match + ' Match</span>' +
                    '<span class="bg-white/10 px-2 py-0.5 rounded text-[10px] uppercase font-black tracking-widest">Ultra HD</span></div>' +
                    '<button onclick="showPage(\'watch\', 0)" class="bg-white text-black px-8 py-3 rounded-xl font-black text-xs flex items-center gap-2 hover:bg-blue-600 hover:text-white active:scale-95 transition-all uppercase tracking-widest shadow-xl w-fit">' +
                    '<i data-lucide="play" class="w-4 h-4 fill-current"></i> Tonton</button></div></section>' +
                    '<section class="px-6 md:px-12 mt-10 space-y-6">' +
                    '<h3 class="text-xs font-black uppercase tracking-[0.4em] flex items-center gap-2 italic text-gray-500">SEMUA SALURAN <i data-lucide="chevron-right" class="w-4 h-4 text-blue-500"></i></h3>' +
                    '<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-6">' +
                    CHANNELS.map(function(ch) {
                        return '<div onclick="showPage(\'watch\', ' + ch.id + ')" class="group cursor-pointer rounded-2xl overflow-hidden bg-[#080808] border border-white/[0.05] hover:border-blue-600 transition-all duration-300 shadow-xl active:scale-95 channel-card">' +
                            '<div class="aspect-video relative overflow-hidden bg-black">' + createBannerHTML(ch) +
                            '<div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-300 bg-black/40">' +
                            '<i data-lucide="play" class="w-6 h-6 fill-white text-white"></i></div></div>' +
                            '<div class="p-4 space-y-1"><h4 class="font-black text-[10px] md:text-[11px] uppercase truncate tracking-widest">' + ch.displayName + '</h4>' +
                            '<span class="text-[9px] text-green-500 font-black italic">' + ch.match + ' Match</span></div></div>';
                    }).join('') +
                    '</div></section></div>';

            } else if (pageName === 'watch') {
                navHome.classList.add('text-blue-500');
                var ch = CHANNELS[channelId];
                var others = CHANNELS.filter(function(c) { return c.id !== ch.id; });
                var recs = others.slice(0, 4);
                var more = others.slice(4);

                container.innerHTML =
                    '<div class="pt-14 animate-in">' +
                    '<div class="sticky-player w-full bg-black shadow-2xl"><div class="relative w-full aspect-video bg-black overflow-hidden group">' +
                    '<video id="video-player" class="w-full h-full object-contain" playsinline autoplay></video></div></div>' +
                    '<div class="max-w-[1400px] mx-auto px-6 md:px-12 mt-8 pb-20">' +
                    '<button onclick="showPage(\'home\')" class="flex items-center gap-2 text-gray-500 hover:text-white mb-6 text-[10px] font-black uppercase tracking-[0.4em] transition-all bg-white/5 px-4 py-2 rounded-full w-fit active:scale-90">' +
                    '<i data-lucide="arrow-left" class="w-3 h-3"></i> Beranda</button>' +
                    '<div class="grid grid-cols-1 lg:grid-cols-3 gap-10 items-start"><div class="lg:col-span-2 space-y-10"><div class="space-y-4">' +
                    '<h2 class="text-3xl md:text-6xl font-[1000] tracking-tighter uppercase italic">' + ch.displayName + '</h2>' +
                    '<div class="flex flex-wrap items-center gap-4 md:gap-6 text-[10px] md:text-xs font-black tracking-widest italic text-gray-400">' +
                    '<span class="text-green-500">SIARAN AKTIF ' + ch.match + '</span>' +
                    '<span class="flex items-center gap-1 text-yellow-500"><i data-lucide="star" class="w-3 h-3 fill-current"></i> ' + ch.rating + '</span>' +
                    '<span class="border border-white/20 px-2 py-0.5 rounded text-[9px] bg-white/5 font-black uppercase">Original HD</span></div>' +
                    '<div class="flex flex-wrap items-center gap-3 pt-3">' +
                    '<button onclick="toggleFullscreen()" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-full font-[900] text-[10px] uppercase tracking-widest transition-all active:scale-95 shadow-[0_0_15px_rgba(37,99,235,0.4)]">' +
                    '<i data-lucide="maximize-2" class="w-4 h-4"></i> Layar Penuh</button>' +
                    '<button onclick="togglePiP()" class="flex items-center gap-2 bg-white/10 hover:bg-white/20 text-white px-5 py-2.5 rounded-full font-[900] text-[10px] uppercase tracking-widest transition-all active:scale-95 border border-white/10 shadow-lg">' +
                    '<i data-lucide="external-link" class="w-4 h-4"></i> PiP Mode</button></div></div>' +
                    '<div class="space-y-6 pt-6 border-t border-white/5">' +
                    '<h3 class="text-[10px] font-black uppercase tracking-[0.4em] text-blue-500 italic">Pilihan Terpopuler</h3>' +
                    '<div class="grid grid-cols-1 gap-4">' +
                    recs.map(function(r) {
                        return '<div onclick="showPage(\'watch\', ' + r.id + ')" class="flex gap-4 bg-[#080808] p-3 rounded-2xl cursor-pointer hover:bg-white/5 border border-transparent hover:border-blue-500/30 transition-all group active:scale-95">' +
                            '<div class="w-24 md:w-32 aspect-video overflow-hidden rounded-xl shrink-0">' + createBannerHTML(r) + '</div>' +
                            '<div class="flex flex-col justify-center overflow-hidden">' +
                            '<h4 class="text-[10px] md:text-xs font-black uppercase tracking-widest truncate group-hover:text-blue-500">' + r.displayName + '</h4>' +
                            '<span class="text-[9px] text-gray-600 font-bold uppercase italic mt-1">' + r.match + ' Match</span></div></div>';
                    }).join('') +
                    '</div></div></div>' +
                    '<div class="hidden lg:block space-y-6 bg-white/5 p-6 rounded-[2rem] border border-white/5">' +
                    '<h4 class="text-[10px] font-black uppercase tracking-widest text-gray-500">Status Jaringan</h4>' +
                    '<div class="flex items-center gap-3"><div class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_#22c55e]"></div>' +
                    '<span class="text-[11px] font-black">Connected (Fast Stream)</span></div>' +
                    '<p class="text-[10px] leading-relaxed text-gray-500 uppercase font-medium">Sistem adaptif HiDZ menyajikan streaming tanpa buffer untuk kualitas Ultra HD.</p>' +
                    '</div></div>' +
                    '<div class="mt-16 space-y-6">' +
                    '<h3 class="text-[10px] font-black uppercase tracking-[0.5em] text-gray-600 italic">Jelajahi Saluran Lainnya</h3>' +
                    '<div class="flex overflow-x-auto gap-4 md:gap-6 pb-10 no-scrollbar scroll-smooth">' +
                    more.map(function(m) {
                        return '<div onclick="showPage(\'watch\', ' + m.id + ')" class="flex-none w-48 md:w-56 group cursor-pointer transition-all active:scale-90">' +
                            '<div class="aspect-video relative overflow-hidden rounded-2xl border border-white/5 group-hover:border-blue-600 transition-all bg-black shadow-lg">' +
                            createBannerHTML(m) +
                            '<div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity bg-black/40">' +
                            '<i data-lucide="play" class="w-6 h-6 fill-white text-white"></i></div></div>' +
                            '<h4 class="mt-4 font-black text-[9px] md:text-[10px] uppercase tracking-widest text-gray-500 group-hover:text-white transition-colors italic truncate">' + m.displayName + '</h4></div>';
                    }).join('') +
                    '</div></div></div></div>';

                // Secure stream loading
                var video = document.getElementById('video-player');
                var streamUrl = _getUrl(ch);
                if (Hls.isSupported()) {
                    hlsInstance = new Hls({
                        enableWorker: true,
                        xhrSetup: function(xhr) {
                            xhr.withCredentials = false;
                        }
                    });
                    hlsInstance.loadSource(streamUrl);
                    hlsInstance.attachMedia(video);
                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                        video.play().catch(function() {});
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = streamUrl;
                    video.addEventListener('loadedmetadata', function() {
                        video.play().catch(function() {});
                    });
                }

                // Sanitize DOM after stream loads
                _sanitizeVideoSrc();

                video.addEventListener('leavepictureinpicture', function() {
                    setTimeout(function() {
                        if (video.paused) video.play().catch(function() {});
                    }, 100);
                });

            } else if (pageName === 'dev') {
                navDev.classList.add('text-blue-500');
                container.innerHTML =
                    '<div class="pt-32 px-6 max-w-4xl mx-auto text-center animate-in">' +
                    '<h2 class="text-5xl md:text-8xl font-[1000] uppercase tracking-tighter mb-4 italic drop-shadow-lg">' +
                    '<span class="rgb-text animate-gradient-x">HiDZ</span> TV</h2>' +
                    '<p class="text-blue-500 text-xs font-black uppercase tracking-[0.8em] mb-12 italic">Developer: HiDZ</p>' +
                    '<div class="max-w-xl mx-auto bg-white/5 p-10 rounded-[2.5rem] border border-white/10 shadow-2xl backdrop-blur-xl">' +
                    '<p class="text-gray-400 text-lg md:text-xl leading-relaxed italic font-medium">' +
                    '"Menyajikan pengalaman menonton televisi digital yang lebih rapi, ringan, dan lengkap dengan teknologi streaming terbaru."</p></div>' +
                    '<div class="mt-8 flex flex-col items-center gap-2">' +
                    '<div class="flex items-center gap-2 text-[9px] font-black text-emerald-500 uppercase tracking-[0.5em]">' +
                    '<i data-lucide="shield-check" class="w-4 h-4"></i> Zero-Exposure Architecture v2.0</div>' +
                    '<p class="text-[8px] text-gray-600 uppercase tracking-widest">7-Layer Security | AES-256-GCM Encrypted</p></div>' +
                    '<button onclick="showPage(\'home\')" class="mt-16 bg-white text-black px-16 py-4 rounded-2xl font-[1000] text-[10px] uppercase tracking-[0.5em] hover:bg-blue-600 hover:text-white transition-all shadow-xl active:scale-90">KEMBALI</button></div>';
            }

            lucide.createIcons();
            window.scrollTo(0, 0);
        };

        window.togglePiP = async function() {
            var video = document.getElementById('video-player');
            try {
                if (video !== document.pictureInPictureElement) {
                    await video.requestPictureInPicture();
                } else {
                    await document.exitPictureInPicture();
                }
            } catch(e) {}
        };

        window.toggleFullscreen = function() {
            var player = document.getElementById('video-player');
            if (player.requestFullscreen) player.requestFullscreen();
            else if (player.webkitRequestFullscreen) player.webkitRequestFullscreen();
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(function() {});
            }
        };

        // ═══════════════════════════════════════
        // BOOT SEQUENCE
        // ═══════════════════════════════════════
        window.onload = function() {
            if (_checkEnv()) {
                initApp();
            }
        };

        // Prevent copy/paste of source
        document.addEventListener('copy', function(e) { e.preventDefault(); });
        document.addEventListener('cut', function(e) { e.preventDefault(); });

        // Detect page visibility changes (tab switching for screenshot tools)
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                setTimeout(function() { _checkEnv(); }, 500);
            }
        });

    })();
    </script>
</body>
</html>
